<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cyrillic Trainer</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="base.css" rel="stylesheet">
  <link href="frontPage.css" rel="stylesheet">
</head>
<body>
  <main class="app-shell">
    <section id="frontPageView" class="front-page" aria-label="Start game">
      <div class="brand-lockup">
        <img class="brand-logo" src="cyrillic_trainer_logo.svg" alt="logo">
      </div>
      <form id="startGameForm" class="start-game-form">
        <label class="front-field" for="homeDatasetSelect">
          <span class="front-field-label">word list:</span>
          <select id="homeDatasetSelect" class="form-select dataset-select" aria-label="Data set"></select>
        </label>
        <label class="front-field" for="homeGameModeSelect">
          <span class="front-field-label">game mode:</span>
          <select id="homeGameModeSelect" class="form-select dataset-select" aria-label="game mode"></select>
        </label>
        <label class="front-field game-number-field" for="homeGameInput">
          <span class="front-field-label">game:</span>
          <span class="game-number-controls">
            <input id="homeGameInput" class="form-control game-input" type="text" inputmode="numeric" autocomplete="off">
            <button id="homeRandomGameButton" class="btn btn-outline-dark random-game-button" type="button" aria-label="Random game number">↻</button>
          </span>
        </label>
        <fieldset class="front-field duration-field">
          <legend class="front-field-label">time:</legend>
          <span id="homeDurationButtons" class="duration-buttons" aria-label="Game duration">
            <button class="btn btn-outline-dark duration-button" type="button" data-seconds="10">10 sek</button>
            <button class="btn btn-outline-dark duration-button" type="button" data-seconds="120">2 min</button>
            <button class="btn btn-outline-dark duration-button" type="button" data-seconds="300">5 min</button>
            <button class="btn btn-outline-dark duration-button" type="button" data-seconds="600">10 min</button>
            <button class="btn btn-outline-dark duration-button" type="button" data-seconds="900">15 min</button>
          </span>
        </fieldset>
        <button class="btn btn-dark start-game-button" type="submit">start game</button>
      </form>
    </section>
    <footer class="credit-line">A game by Kasper B. Graversen</footer>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="data.js"></script>
  <script src="urlSettings.js"></script>
  <script src="storage.js"></script>
  <script src="frontPageUi.js"></script>
  <script src="frontPage.js"></script>
  <script src="app.js"></script>
</body>
</html>
