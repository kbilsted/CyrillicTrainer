<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cyrillic Trainer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body>
  <main class="app-shell">
    <section class="score-line" aria-label="Score">
      <div><span>correct:</span> <strong id="successCounter">0</strong></div>
      <div><span>wrong:</span> <strong id="failCounter">0</strong></div>
      <div><span>ratio:</span> <strong id="successRatio">0.0%</strong></div>
    </section>

    <section id="letterGuessView" class="game-view" aria-label="Letter guess">
      <div id="letterCard" class="letter-card" aria-live="polite">з</div>
      <div id="answerButtons" class="answer-buttons" aria-label="Answer choices"></div>
      <button id="letterNextButton" class="btn btn-dark next-button" type="button" disabled>next</button>
    </section>

    <section id="roundDoneView" class="game-view round-done d-none" aria-label="Round done">
      <h1>ROUND DONE</h1>
      <dl class="word-summary">
        <div>
          <dt>WORD:</dt>
          <dd id="doneCyrillic"></dd>
        </div>
        <div>
          <dt>In Latin:</dt>
          <dd>
            <button id="showLatinButton" class="btn btn-outline-dark show-button" type="button">show</button>
            <span id="doneLatin" class="d-none"></span>
          </dd>
        </div>
        <div>
          <dt>Meaning:</dt>
          <dd id="doneMeaning"></dd>
        </div>
      </dl>
      <button id="roundNextButton" class="btn btn-dark next-button" type="button">next</button>
    </section>

    <section class="bottom-line" aria-label="Round and seed">
      <div><span>round:</span> <strong id="roundCounter">0</strong></div>
      <div><span>seed:</span> <strong id="seedValue">0</strong></div>
      <label class="dataset-select-label" for="datasetSelect">
        <span>data:</span>
        <select id="datasetSelect" class="form-select form-select-sm dataset-select" aria-label="Dataset"></select>
      </label>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="data.js"></script>
  <script src="random.js"></script>
  <script src="storage.js"></script>
  <script src="ui.js"></script>
  <script src="game.js"></script>
  <script src="app.js"></script>
</body>
</html>
