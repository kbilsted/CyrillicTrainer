<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cyrillic Trainer</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="base.css" rel="stylesheet">
  <link href="game.css" rel="stylesheet">
</head>
<body>
  <main class="app-shell">
    <section class="score-line" aria-label="Score">
      <div><span class="score-label">correct:</span> <strong id="successCounter">0</strong></div>
      <div><span class="score-label">time:</span> <strong id="countdownTimer" class="countdown-timer">00:00</strong></div>
    </section>

    <section id="letterGuessView" class="game-view d-none" aria-label="Letter guess">
      <h2 id="questionTitle" class="question-title">Cyrilic → Latin</h2>
      <div id="letterCard" class="letter-card" aria-live="polite">з</div>
      <p class="translation-prompt">Which is the correct translation</p>
      <div id="answerButtons" class="answer-buttons" aria-label="Answer choices"></div>
      <button id="letterNextButton" class="btn btn-dark next-button" type="button" disabled>next</button>
    </section>

    <section id="roundDoneView" class="game-view round-done d-none" aria-label="Round done">
      <h1>Round done</h1>
      <p class="round-done-subtitle">now try reading the word aloud...</p>
      <dl class="word-summary">
        <div>
          <dt>WORD:</dt>
          <dd id="doneCyrillic"></dd>
        </div>
        <div>
          <dt>phonetic:</dt>
          <dd>
            <button class="btn btn-outline-dark show-button reveal-word-button" type="button">show</button>
            <span id="donePhonetic" class="word-phonetic d-none"></span>
          </dd>
        </div>
        <div>
          <dt>In Latin:</dt>
          <dd>
            <button class="btn btn-outline-dark show-button reveal-word-button" type="button">show</button>
            <span id="doneLatin" class="d-none"></span>
          </dd>
        </div>
        <div>
          <dt>Meaning:</dt>
          <dd>
            <button class="btn btn-outline-dark show-button reveal-word-button" type="button">show</button>
            <span id="doneMeaning" class="d-none"></span>
          </dd>
        </div>
      </dl>
      <div class="round-actions">
        <button id="showProgressButton" class="btn btn-outline-dark progress-button" type="button">Statistics</button>
        <button id="roundNextButton" class="btn btn-dark next-button" type="button">next</button>
      </div>
      <section id="progressPanel" class="progress-panel d-none" aria-label="Statistics"></section>
    </section>

    <section id="gameOverView" class="game-view game-over d-none" aria-label="Game done">
      <h1>GAME DONE</h1>
      <section id="gameOverProgressPanel" class="progress-panel" aria-label="Final Statistics"></section>
    </section>

    <section class="bottom-line" aria-label="Game settings">
      <button id="gameNewGameButton" class="btn btn-danger btn-sm game-new-button" type="button">new game</button>
    </section>
    <footer class="credit-line">A game by Kasper B. Graversen</footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="data.js"></script>
  <script src="random.js"></script>
  <script src="urlSettings.js"></script>
  <script src="userProgressStats.js"></script>
  <script src="gameState.js"></script>
  <script src="currentWordState.js"></script>
  <script src="trainingLetters.js"></script>
  <script src="wordScheduler.js"></script>
  <script src="questionFactory.js"></script>
  <script src="storage.js"></script>
  <script src="gameUi.js"></script>
  <script src="game.js"></script>
  <script src="app.js"></script>
</body>
</html>
